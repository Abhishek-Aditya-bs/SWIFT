<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/swift-favicon.svg" />
    <script>
      // Apply saved/system theme before paint to avoid a flash. Default: dark.
      (function () {
        try {
          var t = localStorage.getItem("swift-theme");
          var dark = t ? t === "dark" : true;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SWIFT — lightweight image super-resolution with SwinV2 transformers and Fast Fourier Convolutions. Matches SwinIR with 33% fewer parameters and up to 60% faster inference."
    />
    <meta property="og:title" content="SWIFT — Faster, lighter image super-resolution" />
    <meta
      property="og:description"
      content="A hybrid of Swin transformers and Fast Fourier Convolutions for lightweight single-image super-resolution. State-of-the-art quality, 33% fewer parameters, up to 60% faster."
    />
    <meta property="og:type" content="website" />
    <title>SWIFT — Faster, lighter image super-resolution</title>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
